name: Repository Provisioning

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write
  administration: write

jobs:

  process:
    if: >
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.logic.outputs.result }}
      message: ${{ steps.logic.outputs.message }}
      repo_url: ${{ steps.logic.outputs.repo_url }}

    steps:

      # 🔐 Generate GitHub App Token
      - uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      # 🧠 All Logic In One Deterministic Step
      - name: Process Request
        id: logic
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const core = require('@actions/core');
            const body = context.payload.issue.body;

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            }

            try {
              const product = extract("Product Line");
              const aspect = extract("Aspect / Domain");
              const name = extract("Repository Name");
              const tenant = extract("Tenant Name \\(Optional\\)");
              const description = extract("Repository Description");
              const visibilityRaw = extract("Repository Visibility");

              if (!product || !aspect || !name || !description || !visibilityRaw) {
                core.setOutput("result", "PARSE_ERROR");
                core.setOutput("message", "Missing required fields.");
                return;
              }

              if (!/^[a-z0-9-]+$/.test(name)) {
                core.setOutput("result", "PARSE_ERROR");
                core.setOutput("message", "Repository name must be kebab-case.");
                return;
              }

              const finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              // 🔍 Check duplicate
              try {
                await github.rest.repos.get({
                  owner: context.repo.owner,
                  repo: finalName
                });

                core.setOutput("result", "DUPLICATE");
                core.setOutput("message", "Repository already exists.");
                return;

              } catch {}

              // 🚀 Create repo
              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: finalName,
                description,
                visibility: visibilityRaw.includes("Private") ? "private" : "internal",
                auto_init: true
              });

              core.setOutput("result", "SUCCESS");
              core.setOutput("repo_url", repo.data.html_url);
              core.setOutput("message", "Repository created successfully.");

            } catch (err) {
              core.setOutput("result", "ERROR");
              core.setOutput("message", err.message);
            }

  finalize:
    needs: process
    runs-on: ubuntu-latest

    steps:
      - name: Comment & Close if needed
        uses: actions/github-script@v7
        with:
          script: |
            const result = "${{ needs.process.outputs.result }}";
            const message = "${{ needs.process.outputs.message }}";
            const url = "${{ needs.process.outputs.repo_url }}";

            let body = "";

            switch(result) {
              case "SUCCESS":
                body = `✅ ${message}\n\n🔗 ${url}`;
                break;
              case "DUPLICATE":
                body = `❌ ${message}`;
                break;
              case "PARSE_ERROR":
                body = `❌ ${message}\n\nPlease edit the issue and correct it.`;
                break;
              default:
                body = `❌ Unexpected error: ${message}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (result === "SUCCESS" || result === "DUPLICATE") {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed"
              });
            }