name: Repository Provisioning

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:

  process:
    if: >
      contains(github.event.issue.labels.*.name, 'repo-creation-request') &&
      startsWith(github.event.issue.title, '[REPO-CREATION-REQUEST]')
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.logic.outputs.status }}
      message: ${{ steps.logic.outputs.message }}
      repo_url: ${{ steps.logic.outputs.repo_url }}

    steps:

      # 🔐 Generate GitHub App Token
      - uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      # 🧠 All Logic In One Deterministic Step
      - name: Process Request
        id: logic
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = context.payload.issue.body;

            console.log("----- Repository Provisioning Started -----");
            console.log("Issue:", context.issue.number);

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s+([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            }

            try {
              const product = extract("Product Line");
              const aspect = extract("Aspect / Domain");
              const name = extract("Repository Name");
              let tenant = extract("Tenant Name \\(Optional\\)");

              if (!tenant || tenant === "_No response_") {
                tenant = null;
              }

              const description = extract("Repository Description");
              const visibilityRaw = extract("Repository Visibility");

              if (!product || !aspect || !name || !description || !visibilityRaw) {
                return {
                  status: "PARSE_ERROR",
                  message: "Missing required fields."
                };
              }

              if (!/^[a-z0-9-]+$/.test(name)) {
                return {
                  status: "PARSE_ERROR",
                  message: "Repository name must be kebab-case."
                };
              }

              const finalName = tenant
                ? `${product}-${aspect}-${name}-${tenant}`
                : `${product}-${aspect}-${name}`;

              console.log("Checking duplicate for:", finalName);

              try {
                await github.rest.repos.get({
                  owner: context.repo.owner,
                  repo: finalName
                });

                return {
                  status: "DUPLICATE",
                  message: "Repository already exists."
                };

              } catch (duplicateCheckError) {

                if (duplicateCheckError.status === 404) {
                  console.log("No duplicate found.");
                } else {
                  console.error("Duplicate check failed:", duplicateCheckError.message);
                  return {
                    status: "ERROR",
                    message: `Duplicate verification failed: ${duplicateCheckError.message}`
                  };
                }
              }

              console.log("Creating repository:", finalName);

              const repo = await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: finalName,
                description,
                visibility: visibilityRaw.includes("Private") ? "private" : "internal",
                auto_init: true
              });

              console.log("Repository created:", repo.data.html_url);

              return {
                status: "SUCCESS",
                message: "Repository created successfully.",
                repo_url: repo.data.html_url
              };

            } catch (unhandledError) {
              console.error("Unhandled error:", unhandledError.message);

              return {
                status: "ERROR",
                message: unhandledError.message
              };
            }

  finalize:
    needs: process
    runs-on: ubuntu-latest

    steps:
      - name: Comment & Close if needed
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ needs.process.outputs.status }}";
            const message = "${{ needs.process.outputs.message }}";
            const url = "${{ needs.process.outputs.repo_url }}";

            console.log("DEBUG status:", status);
            console.log("DEBUG message:", message);
            console.log("DEBUG url:", url);

            let body = "";

            switch(status) {
              case "SUCCESS":
                body = `✅ ${message}\n\n🔗 ${url}`;
                break;
              case "DUPLICATE":
                body = `❌ ${message}`;
                break;
              case "PARSE_ERROR":
                body = `❌ ${message}\n\nPlease edit the issue and correct it.`;
                break;
              default:
                body = `❌ Unexpected error: ${message}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (status === "SUCCESS" || status === "DUPLICATE") {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed"
              });
            }